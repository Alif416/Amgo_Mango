name: myapp
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # Utility Packages
  http: ^1.2.2
  intl: ^0.20.1
  logger: ^2.5.0
  url_launcher: ^6.3.1
  flutter_native_splash: ^2.4.3

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1
  shared_preferences: ^2.3.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logos/Amgo_mango_logo.png

flutter_native_splash:
  color: "#ffffff"
  image: assets/logos/Amgo_mango_logo.png
  branding: assets/logos/Amgo_mango_logo.png
  color_dark: "#121212"
  image_dark: assets/logos/Amgo_mango_logo.png
  branding_dark: assets/logos/Amgo_mango_logo.png

  android_12:
    image: assets/logos/Amgo_mango_logo.png
    icon_background_color: "#ffffff"
    image_dark: assets/logos/Amgo_mango_logo.png
    icon_background_color_dark: "#121212"

  web: false
